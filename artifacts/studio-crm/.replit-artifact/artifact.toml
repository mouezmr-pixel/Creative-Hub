kind = "web"
previewPath = "/"
title = "Creative Studio CRM"
version = "1.0.0"
id = "artifacts/studio-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19757

[services.development]
run = "pnpm --filter @workspace/studio-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studio-crm", "run", "build" ]
publicDir = "artifacts/studio-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19757"
BASE_PATH = "/"
