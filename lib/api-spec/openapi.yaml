components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    UserPermissions:
      type: object
      properties:
        canViewFinancials:
          type: boolean
        canManageClients:
          type: boolean
        canManageAllProjects:
          type: boolean
        canInvoice:
          type: boolean
        canViewLeads:
          type: boolean
        canViewAccounting:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, photographer, client]
        profession:
          type: ["string", "null"]
        paymentType:
          type: string
          enum: [monthly_salary, per_project]
        salaryAmount:
          type: ["number", "null"]
        canViewFinancials:
          type: boolean
        canManageClients:
          type: boolean
        canManageAllProjects:
          type: boolean
        canInvoice:
          type: boolean
        canViewLeads:
          type: boolean
        canViewAccounting:
          type: boolean
        archivedAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - username
        - name
        - role
        - paymentType
        - canViewFinancials
        - canManageClients
        - canManageAllProjects
        - canInvoice
        - canViewLeads
        - canViewAccounting
        - createdAt

    CreateUserBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        name:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, photographer, client]
        profession:
          type: ["string", "null"]
        paymentType:
          type: string
          enum: [monthly_salary, per_project]
        salaryAmount:
          type: ["number", "null"]
        canViewFinancials:
          type: boolean
        canManageClients:
          type: boolean
        canManageAllProjects:
          type: boolean
        canInvoice:
          type: boolean
        canViewLeads:
          type: boolean
        canViewAccounting:
          type: boolean
      required:
        - username
        - password
        - name
        - role

    UpdateUserBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        password:
          type: ["string", "null"]
        profession:
          type: ["string", "null"]
        paymentType:
          type: ["string", "null"]
        salaryAmount:
          type: ["number", "null"]
        canViewFinancials:
          type: ["boolean", "null"]
        canManageClients:
          type: ["boolean", "null"]
        canManageAllProjects:
          type: ["boolean", "null"]
        canInvoice:
          type: ["boolean", "null"]
        canViewLeads:
          type: ["boolean", "null"]
        canViewAccounting:
          type: ["boolean", "null"]

